function renderDashboard(){const n=nowInfo();const monthWeeks=monthWeekSet(n.year,n.month);const monthLaunch=state.variants.filter(v=>monthWeeks.has(v.season.peakStartWeek));const monthActions=state.actions.filter(a=>a.year===n.year&&monthWeeks.has(a.week)&&a.status==='pending');const overdue=pendingOverdue();const lock=state.actions.filter(a=>a.status==='pending'&&a.templateId==='lock-price');const upcoming=state.variants.filter(v=>weekDistance(n.week,v.season.peakStartWeek)<=4).sort((a,b)=>weekDistance(n.week,a.season.peakStartWeek)-weekDistance(n.week,b.season.peakStartWeek)).slice(0,8);const weekActions=state.actions.filter(a=>a.year===n.year&&a.week===n.week&&a.status==='pending').sort(sortActions);const priorityActions=state.actions.filter(a=>a.status==='pending'&&a.year===n.year&&a.week===n.week).sort((a,b)=>{const u=(URGENCY_ORDER[a.urgency]||9)-(URGENCY_ORDER[b.urgency]||9);if(u!==0)return u;if(a.templateId==='lock-price'&&b.templateId!=='lock-price')return-1;if(b.templateId==='lock-price'&&a.templateId!=='lock-price')return 1;return a.week-b.week}).slice(0,5);const weekTotal=state.actions.filter(a=>a.status==='pending'&&a.year===n.year&&a.week===n.week).length;const peakStartThisWeek=state.variants.filter(v=>v.season.peakStartWeek===n.week);const lowPriceNow=state.variants.filter(v=>inRange(n.week,v.season.lowPriceWeekStart,v.season.lowPriceWeekEnd));const stableQualityNow=state.variants.filter(v=>inRange(n.week,v.season.stableQualityWeekStart,v.season.stableQualityWeekEnd));const endingSoon=state.variants.filter(v=>{const d=weekDistance(n.week,v.season.endWeek);return d>0&&d<=4});document.getElementById('view').innerHTML=`<div class="card priority-card"><div class="section-title" style="margin:0 0 12px"><h3>本周必做 · W${n.week}</h3><span class="muted">本周共 ${weekTotal} 条待办 · 已逾期 ${overdue.length} 条</span></div><div class="list">${priorityActions.map(actionRow).join('')||'<div class="empty">本周无紧急行动 ✓</div>'}</div>${weekTotal>5?`<div class="muted" style="margin-top:8px">查看全部 ${weekTotal} 条 → <a href="#/actions" onclick="ui.actionMode='week'">行动清单</a></div>`:''}</div><div class="grid4" style="margin-top:14px"><div class="card kpi" onclick="goActions('month')"><strong>${monthLaunch.length}</strong><span>本月即上市</span></div><div class="card kpi" onclick="goActions('month')"><strong>${monthActions.length}</strong><span>本月待办行动，高紧急 ${monthActions.filter(a=>a.urgency==='高').length} 条</span></div><div class="card kpi" onclick="goActions('overdue')"><strong>${overdue.length}</strong><span>已逾期行动</span></div><div class="card kpi" onclick="goActions('lock')"><strong>${lock.length}</strong><span>锁价待签</span></div></div><div class="radar-grid">${radarCard(peakStartThisWeek,'🎯 本周大量上市开始',v=>esc(catOf(v).name))}${radarCard(lowPriceNow,'💰 本周价格洼地',v=>'W'+v.season.lowPriceWeekStart+'-W'+v.season.lowPriceWeekEnd)}${radarCard(stableQualityNow,'⭐ 本周品质稳定窗口',v=>'W'+v.season.stableQualityWeekStart+'-W'+v.season.stableQualityWeekEnd)}${radarCard(endingSoon,'📅 4 周内即将下市',v=>'W'+v.season.endWeek)}</div><div class="section-title"><h3>即将上市 · 未来 4 周</h3><button class="btn" onclick="location.hash='#/calendar'">查看日历</button></div><div class="list">${upcoming.map(v=>variantRow(v,`进入大量期还有 ${weekDistance(n.week,v.season.peakStartWeek)} 周`)).join('')||empty('未来 4 周没有进入大量期的变体')}</div><div class="section-title"><h3>本周行动建议</h3><button class="btn primary" onclick="location.hash='#/actions'">立即查看</button></div><div class="list">${weekActions.map(actionRow).join('')||empty('本周暂无待处理行动')}</div><details class="card" style="margin-top:14px"><summary>已逾期 · ${overdue.length} 条</summary><div class="list" style="margin-top:10px">${overdue.map(actionRow).join('')||empty('暂无逾期行动')}</div></details>${dashboardAnalysisHtml()}`}function radarCard(items,label,metaFn){return`<details class="card radar-card"><summary><strong>${items.length}</strong> <span>${label}</span></summary><div class="list" style="margin-top:8px">${items.map(v=>variantRow(v,metaFn(v))).join('')||empty('暂无')}</div></details>`}function weeklyCount(w){return state.variants.filter(v=>weekPhase(v.season,w)==='peak').length}function dashboardAnalysisHtml(){const counts=weeks().map(w=>weeklyCount(w));const max=Math.max(...counts),min=Math.min(...counts);const crowded=counts.map((c,i)=>({week:i+1,count:c})).filter(x=>x.count===max).map(x=>'W'+x.week).join(' / ');const sparse=counts.map((c,i)=>({week:i+1,count:c})).filter(x=>x.count===min).map(x=>'W'+x.week).join(' / ');const riskCounts={天气:0,品质:0,价格:0,履约:0,物流:0,政策:0};state.variants.forEach(v=>(v.risks||[]).forEach(r=>riskCounts[r.type]=(riskCounts[r.type]||0)+1));const maxRisk=Math.max(1,...Object.values(riskCounts));const riskHtml=Object.entries(riskCounts).sort((a,b)=>b[1]-a[1]).map(([type,count])=>`<div class="risk-bar" style="width:${Math.max(8,count/maxRisk*100)}%">${esc(type)} ${count}</div>`).join('');const countByOrigin={国产:0,进口:0,混合:0};state.variants.forEach(v=>countByOrigin[v.originType]=(countByOrigin[v.originType]||0)+1);const total=Math.max(1,state.variants.length);const originColors={国产:'var(--green)',进口:'var(--blue)',混合:'var(--gold)'};const originStack=Object.entries(countByOrigin).map(([type,count])=>`<span style="width:${count/total*100}%;background:${originColors[type]||'var(--muted)'}" title="${type}: ${count}">${count?type:''}</span>`).join('');return`<div class="section-title"><h3>全年覆盖与风险分析</h3></div><div class="analysis-grid"><div class="card"><h3>全年每周可选品类数</h3><div class="weekly-density">${weeks().map(w=>`<div class="dw" style="height:${Math.min(weeklyCount(w)*4,250)}px" title="W${w}: ${weeklyCount(w)} 个变体在大量期"></div>`).join('')}</div><div class="muted" style="margin-top:8px">最拥挤：${crowded}（${max} 个） · 最空档：${sparse}（${min} 个）</div></div><div class="card"><h3>风险类型分布</h3>${riskHtml}</div><div class="card"><h3>进口 / 国产 / 混合占比</h3><div class="origin-stack">${originStack}</div><div class="list" style="margin-top:10px">${Object.entries(countByOrigin).map(([k,v])=>`<div class="row"><span>${esc(k)}</span><strong>${v}</strong></div>`).join('')}</div></div></div>`}function monthWeekSet(year,month){const set=new Set();for(let d=new Date(year,month-1,1);d.getMonth()===month-1;d.setDate(d.getDate()+1))set.add(isoWeek(d));return set}function weekDistance(from,to){return to>=from?to-from:52-from+to}function pendingOverdue(){const n=nowInfo();return state.actions.filter(a=>a.status==='pending'&&(a.year<n.year||(a.year===n.year&&a.week<n.week))).sort(sortActions)}function variantRow(v,meta){const c=catOf(v);return`<div class="row" onclick="openVariant('${v.id}')"><div class="row-main"><div class="row-title">${esc(v.name)}</div><div class="row-sub">${esc(c.name)} · ${esc(originText(v))} · ${esc((v.tags||[]).join(' / '))}</div></div><span class="badge">${meta}</span></div>`}function actionRow(a){const v=variantById(a.variantId);const t=actionTemplates.find(x=>x.id===a.templateId);const cls=a.urgency==='高'?'high':a.urgency==='中'?'mid':'low';return`<div class="row ${a.status==='done'?'status-done':''} ${a.status==='skipped'?'status-skipped':''}"><div class="row-main"><div class="row-title"><span class="badge ${cls}">${a.urgency}</span> ${esc(v?.name||a.variantId)} · ${esc(a.name)}</div><div class="row-sub">${a.year} W${a.week} · ${weekRange(a.year,a.week)} · ${ACTION_STATUS[a.status]}${a.completedAt?' · 完成于 '+new Date(a.completedAt).toLocaleDateString('zh-CN'):''}</div>${t?.checklist?`<details><summary class="muted">操作清单</summary><ul>${t.checklist.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></details>`:''}</div><div class="tools">${a.status==='pending'?`<button class="btn" onclick="completeAction('${a.id}')">完成</button><button class="btn" onclick="rescheduleAction('${a.id}')">改期</button><button class="btn" onclick="skipAction('${a.id}')">跳过</button>`:`<button class="btn" onclick="reopenAction('${a.id}')">恢复</button>`}<button class="btn" onclick="openVariant('${a.variantId}')">详情</button></div></div>`}
function renderCalendar(){const groups=[...new Set(baseCategories.map(c=>c.group))];const tags=[...new Set(state.variants.flatMap(v=>v.tags||[]))].sort();const variants=filteredVariants();document.getElementById('view').innerHTML=`<div class="filterbar"><select id="fGroup"><option value="all">全部分组</option>${groups.map(g=>`<option ${ui.group===g?'selected':''}>${g}</option>`).join('')}</select><select id="fOrigin"><option value="all">国产/进口</option><option ${ui.originType==='国产'?'selected':''}>国产</option><option ${ui.originType==='进口'?'selected':''}>进口</option><option ${ui.originType==='混合'?'selected':''}>混合</option></select><select id="fPriority"><option value="all">全部优先级</option><option value="1" ${ui.priority==='1'?'selected':''}>优先级 1</option><option value="2" ${ui.priority==='2'?'selected':''}>优先级 2</option><option value="3" ${ui.priority==='3'?'selected':''}>优先级 3</option></select><select id="fTag"><option value="all">全部标签</option>${tags.map(t=>`<option ${ui.tag===t?'selected':''}>${esc(t)}</option>`).join('')}</select><select id="fSort"><option value="season" ${ui.sort==='season'?'selected':''}>按上市期</option><option value="category" ${ui.sort==='category'?'selected':''}>按品类</option><option value="priority" ${ui.sort==='priority'?'selected':''}>按优先级</option></select><button class="btn" disabled>按月</button><button class="btn" disabled>按旬</button><button class="btn primary">按周</button></div><div class="calendar-wrap"><div class="calendar"><div class="week-ruler"><div class="name-cell">变体 / 周次</div>${weeks().map(w=>`<div class="week-cell ${w===nowInfo().week?'week-now today-label':''}">${w===nowInfo().week?'今':''}W${w}</div>`).join('')}</div>${renderCalendarRows(variants)}</div></div>`;bindCalendarFilters();setTimeout(()=>document.querySelector('.calendar-wrap .week-now')?.scrollIntoView({inline:'center',block:'nearest'}),50)}function filteredVariants(){let arr=[...state.variants];if(ui.group!=='all')arr=arr.filter(v=>catOf(v).group===ui.group);if(ui.originType!=='all')arr=arr.filter(v=>v.originType===ui.originType);if(ui.priority!=='all')arr=arr.filter(v=>String(v.priority)===ui.priority);if(ui.tag!=='all')arr=arr.filter(v=>(v.tags||[]).includes(ui.tag));if(ui.sort==='season')arr.sort((a,b)=>a.season.peakStartWeek-b.season.peakStartWeek);if(ui.sort==='category')arr.sort((a,b)=>a.categoryId.localeCompare(b.categoryId)||a.name.localeCompare(b.name));if(ui.sort==='priority')arr.sort((a,b)=>a.priority-b.priority||a.season.peakStartWeek-b.season.peakStartWeek);return arr}function renderCalendarRows(vars){const byGroup=groupBy(vars,v=>catOf(v).group);return Object.entries(byGroup).map(([g,items])=>`<div class="group-head">${esc(g)} · ${items.length}</div>${items.map(v=>`<div class="cal-row"><button class="name-cell" onclick="openVariant('${v.id}')">${esc(v.name)}</button>${weeks().map(w=>calendarCell(v,w)).join('')}</div>`).join('')}`).join('')||empty('无匹配变体')}function calendarCell(v,w){const c=catOf(v),color=GROUP_COLORS[c.group]||GROUP_COLORS['其他'],phase=weekPhase(v.season,w),now=w===nowInfo().week?'week-now':'',low=inRange(w,v.season.lowPriceWeekStart,v.season.lowPriceWeekEnd),stable=inRange(w,v.season.stableQualityWeekStart,v.season.stableQualityWeekEnd),title=`${v.name} W${w} ${phase||'非上市期'}${low?' · 价格洼地':''}${stable?' · 品质稳定':''}`;return`<div class="band ${phase||''} ${low?'low':''} ${stable?'stable':''} ${now}" title="${esc(title)}" onclick="addActionAtWeek('${v.id}',${w})" style="background:${phase?color:'transparent'}"></div>`}function weekPhase(season,w){if(inRange(w,season.peakStartWeek,season.peakEndWeek))return'peak';if(inRange(w,season.earliestWeek,normalizeWeek(season.peakStartWeek-1)))return'pre';if(inRange(w,normalizeWeek(season.peakEndWeek+1),season.endWeek))return'post';return''}function inRange(w,start,end){if(start===end)return w===start;return start<end?w>=start&&w<=end:w>=start||w<=end}function weeks(){return Array.from({length:52},(_,i)=>i+1)}function bindCalendarFilters(){[['fGroup','group'],['fOrigin','o function variantInputChanged(){if(ui.editingSection)updateSavedBadge(state);else scheduleSave()}function variantStructureChanged(){if(!ui.editingSection)scheduleSave();renderVariants()}function bindVariantInputs(){const v=variantById(ui.selectedVariantId);if(!v)return;document.querySelectorAll('[data-path]').forEach(el=>el.oninput=()=>{setPath(v,el.dataset.path,coerce(el.value,el.type));if(el.dataset.path==='tags')v.tags=splitList(el.value);if(el.dataset.path==='priceTrend.notableEvents')setPath(v,el.dataset.path,splitList(el.value));variantInputChanged()});document.querySelectorAll('[data-array]').forEach(el=>el.oninput=()=>{const arr=getPath(v,el.dataset.array);arr[Number(el.dataset.index)][el.dataset.key]=coerce(el.value,el.type);variantInputChanged()});document.querySelectorAll('[data-list]').forEach(el=>el.oninput=()=>{getPath(v,el.dataset.list)[Number(el.dataset.index)]=el.value;variantInputChanged()});bindTransactionInputs();const s=document.getElementById('saveText');if(s)s.textContent=new Date(state.meta.lastSavedAt).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}function setPath(obj,path,value){const parts=path.split('.');let cur=obj;while(parts.length>1){const p=parts.shift();if(!cur[p])cur[p]={};cur=cur[p]}cur[parts[0]]=value}function getPath(obj,path){return path.split('.').reduce((o,k)=>o?.[k],obj)}function coerce(value,type){return type==='number'?Number(value):value}function splitList(s){return String(s||'').split(/[,，]/).map(x=>x.trim()).filter(Boolean)}function selectVariant(id){ui.selectedVariantId=id;renderVariants()}function openVariant(id){ui.selectedVariantId=id;location.hash='#/variants';render()}function blankVariantTemplate(){return{id:'',name:'新增变体',variety:'',categoryId:baseCategories[0].id,originType:'国产',origin:{},season:{earliestWeek:1,peakStartWeek:1,peakEndWeek:52,lowPriceWeekStart:1,lowPriceWeekEnd:52,stableQualityWeekStart:1,stableQualityWeekEnd:52,endWeek:52},specs:[],procurementPrice:{unit:'元/斤',low:0,typical:0,high:0},retailPrice:{unit:'元/斤',low:0,typical:0,high:0},supplierTypes:[],risks:[],coldStorage:{tempRange:'',humidity:'',shelfLife:'',notes:''},lossRate:{warehouse:0,retail:0},grossMargin:{low:0,typical:0,high:0},negotiationTips:[],priceTrend:{summary:''},tags:[],priority:2,dataConfidence:'低',notes:''}}function newVariant(){const id='new-variant-'+Date.now();const v=blankVariantTemplate();v.id=id;state.variants.unshift(v);state.actions=ensureActions(state.variants,state.actions);ui.selectedVariantId=id;persistNow();renderVariants()}function copyVariant(){const v=clone(variantById(ui.selectedVariantId));v.id=v.id+'-copy-'+Date.now();v.name=v.name+' 副本';state.variants.unshift(v);state.actions=ensureActions(state.variants,state.actions);ui.selectedVariantId=v.id;persistNow();renderVariants()}function deleteVariant(){const v=variantById(ui.selectedVariantId);if(!v||!confirm(`确认删除 ${v.name}？相关行动也会删除。`))return;state.variants=state.variants.filter(x=>x.id!==v.id);state.actions=state.actions.filter(a=>a.variantId!==v.id);ui.selectedVariantId=state.variants[0]?.id||'';persistNow();renderVariants()}function addArrayRow(path){const v=variantById(ui.selectedVariantId),arr=getPath(v,path);arr.push(path==='risks'?{type:'品质',description:''}:{grade:'',description:''});variantStructureChanged()}function removeArrayRow(path,i){getPath(variantById(ui.selectedVariantId),path).splice(i,1);variantStructureChanged()}function addListRow(path){getPath(variantById(ui.selectedVariantId),path).push('');variantStructureChanged()}function removeListRow(path,i){getPath(variantById(ui.selectedVariantId),path).splice(i,1);variantStructureChanged()}
function renderFestivals(){const currentWeek=nowInfo().week;const festivals=buildFestivals(nowInfo().year);document.getElementById('view').innerHTML='<div class="festival-grid">'+festivals.map(f=>renderFestivalCard(f,currentWeek)).join('')+'</div>'}function renderFestivalCard(f,currentWeek){const active=inRange(currentWeek,normalizeWeek(f.startWeek-4),f.endWeek);const peakHits=state.variants.filter(v=>festivalWeeks(f).some(w=>inRange(w,v.season.peakStartWeek,v.season.peakEndWeek))).sort((a,b)=>(a.priority||3)-(b.priority||3)||a.name.localeCompare(b.name));const lockHits=state.variants.filter(v=>inRange(v.season.peakStartWeek,normalizeWeek(f.startWeek-4),f.startWeek)).sort((a,b)=>(a.priority||3)-(b.priority||3)||a.name.localeCompare(b.name));return '<section class="festival-card '+(active?'active':'')+'"><h3>'+f.emoji+' '+esc(f.name)+'</h3><div class="meta">W'+f.startWeek+(f.endWeek!==f.startWeek?'-W'+f.endWeek:'')+' · '+weekMonthText(f.startWeek,f.endWeek)+'</div><div class="festival-section"><h4>档内高峰变体 · '+peakHits.length+'</h4><div class="list">'+(peakHits.slice(0,8).map(v=>variantRow(v,esc(catOf(v).name))).join('')||empty('暂无'))+'</div></div><div class="festival-section"><h4>建议提前 4 周锁货 · '+lockHits.length+'</h4><div class="list">'+(lockHits.slice(0,8).map(v=>variantRow(v,'W'+v.season.peakStartWeek+' 大量上市')).join('')||empty('暂无'))+'</div></div></section>'}function festivalWeeks(f){const out=[];let w=f.startWeek;for(let i=0;i<53;i++){out.push(w);if(w===f.endWeek)break;w=normalizeWeek(w+1)}return out}function weekMonthText(startWeek,endWeek){const year=nowInfo().year;const start=weekRange(year,startWeek);return endWeek===startWeek?start:start+' 至 '+weekRange(year,endWeek)}function renderVariants(){if(!ui.selectedVariantId||!variantById(ui.selectedVariantId))ui.selectedVariantId=state.variants[0]?.id||'';document.getElementById('view').innerHTML='<div class="layout-split"><div class="card tree">'+renderTreeWrapper()+'</div><div>'+renderVariantDetailView(variantById(u function renderVariantDetailView(v){if(!v)return empty('暂无变体');const c=catOf(v);const price=v.procurementPrice||{};const retail=v.retailPrice||{};const s=v.season||{};return '<div class="detail-page"><div class="detail-header"><div class="detail-top"><div><div class="breadcrumb">'+esc(c.group)+' / '+esc(c.name)+'</div><h1 class="detail-title">'+esc(v.name)+'</h1><div class="detail-subtitle">'+esc(v.variety||'未填写品种')+' · '+esc(originText(v)||'未填写产地')+'</div><div class="core-origin">核心产区：'+esc(v.coreOrigin?.region||'未填写')+'</div></div><div class="tools"><button class="btn" onclick="copyVariant()">复制</button><button class="btn danger" onclick="deleteVariant()">删除</button></div></div><div class="chip-row">'+(v.tags||[]).map(t=>'<span class="chip">'+esc(t)+'</span>').join('')+'</div></div>'+variantInfoSection('上市节奏',['最早上市 W'+s.earliestWeek,'大量期 W'+s.peakStartWeek+'-W'+s.peakEndWeek,'价格洼地 W'+s.lowPriceWeekStart+'-W'+s.lowPriceWeekEnd,'品质稳定 W'+s.stableQualityWeekStart+'-W'+s.stableQualityWeekEnd,'下市 W'+s.endWeek])+variantInfoSection('价格与毛利',['采购价 '+money(price.low)+' ~ '+money(price.high)+' '+esc(price.unit||'元/斤'),'零售价 '+money(retail.low)+' ~ '+money(retail.high)+' '+esc(retail.unit||'元/斤'),'典型毛利 '+percent(v.grossMargin?.typical||0)])+variantListSection('规格',v.specs||[],x=>'<strong>'+esc(x.grade)+'</strong><div class="muted">'+esc(x.description)+'</div>')+variantListSection('风险',(v.risks||[]),x=>'<strong>'+esc(x.type)+'</strong><div class="muted">'+esc(x.description)+'</div>')+variantListSection('谈判要点',(v.negotiationTips||[]),x=>esc(x))+'</div>'}
function variantInfoSection(title,items){return '<section class="detail-section"><div class="detail-section-head"><h3>'+esc(title)+'</h3></div><div class="list">'+items.map(x=>'<div class="row"><span>'+x+'</span></div>').join('')+'</div></section>'}

function reviewYears(){const years=[...new Set((state.transactions||[]).map(t=>Number(t.year)||Number(String(t.date||'').slice(0,4))).filter(Boolean))].sort((a,b)=>b-a);return years.length?years:[nowInfo().year]}function txYear(t){return Number(t.year)||Number(String(t.date||'').slice(0,4))||nowInfo().year}function txWeek(t){return t.date?dateToIsoWeek(t.date):Number(t.week)||0}function selectReviewYear(year){ui.reviewYear=Number(year);renderReview()}function renderReview(){const years=reviewYears();if(!ui.reviewYear||!years.includes(Number(ui.reviewYear)))ui.reviewYear=years[0];const year=Number(ui.reviewYear);const txs=(state.transactions||[]).filter(t=>txYear(t)===year);const variantIds=new Set(txs.map(t=>t.variantId));const supplierNames=new Set(txs.map(t=>String(t.supplierName||'').trim()).filter(Boolean));const priorityTotal=state.variants.filter(v=>Number(v.priority)<=2).length;const amount=txs.reduce((s,t)=>s+(Number(t.totalAmount)||0),0);const variantsWithTx=state.variants.filter(v=>variantIds.has(v.id)).sort((a,b)=>(Number(a.priority)||3)-(Number(b.priority)||3)||a.name.localeCompare(b.name));document.getElementById('view').innerHTML=`<div class="filterbar"><select id="reviewYear">${years.map(y=>`<option value="${y}" ${y===year?'selected':''}>${y} 年</option>`).join('')}</select><span class="muted">按成交记录年度复盘采购执行</span></div><div class="review-kpis"><div class="card kpi"><strong>${txs.length}</strong><span>总成交笔数</span></div><div class="card kpi"><strong>¥${money(amount)}</strong><span>总采购金额</span></div><div class="card kpi"><strong>${variantIds.size}/${priorityTotal}</strong><span>涉及品种 / 重点品种</span></div><div class="card kpi"><strong>${supplierNames.size}</strong><span>涉及供应商</span></div>${renderActionCompletion(year)}</div><div class="section-title"><h3>品种复盘列表</h3><span class="muted">${variantsWithTx.length} 个有成交品种</span></div><div class="review-list">${variantsWithTx.map(v=>renderVariantReviewRow(v,txs.filter(t=>t.variantId===v.id),year)).join('')||empty('本年暂无成交记录')}</div>${renderZeroTransactionVariants(txs,year)}<div class="section-title"><h3>供应商排行</h3><span class="muted">按本年成交总额降序 Top 10</span></div>${renderSupplierRanking(txs)}`;document.getElementById('reviewYear').onchange=e=>selectReviewYear(e.target.value);bindReviewInputs()}function renderActionCompletion(year){const acts=(state.actions||[]).filter(a=>Number(a.year)===Number(year));const done=acts.filter(a=>a.status==='done').length;const rate=acts.length?done/acts.length:0;const split=['高','中','低'].map(u=>{const items=acts.filter(a=>a.urgency===u);const finished=items.filter(a=>a.status==='done').length;const r=items.length?finished/items.length:0;return`${u} ${finished}/${items.length||0}（${percent(r)}）`}).join(' · ');return`<div class="card"><strong>${done} / ${acts.length}</strong><span>行动完成率 ${percent(rate)}</span><div class="progress"><span style="width:${Math.round(rate*100)}%"></span></div><div class="muted">${esc(split)}</div></div>`}function renderVariantReviewRow(v,txList,year){const amount=txList.reduce((s,t)=>s+(Number(t.totalAmount)||0),0);const qty=txList.reduce((s,t)=>s+(Number(t.quantity)||0),0);const avg=qty?amount/qty:0;const note=state.reviewNotes?.[v.id]?.[year]||'';return`<div class="review-row"><div><h4>${esc(v.name)}</h4><div class="review-stats">${esc(catOf(v).name)} · ${txList.length} 笔 · ${reviewQuantityText(txList)} · ¥${money(avg)} 均价 · ¥${money(amount)} 总额</div><div style="margin-top:6px">${priceDeviationBadge(avg,v.procurementPrice)}</div></div><div><div class="review-timeline">${weeks().map(w=>reviewTimelineCell(v,txList,w)).join('')}</div><div class="muted" style="margin-top:6px">绿色为大量上市窗口；金色为窗口内成交，红色为窗口外成交</div></div><textarea class="review-note" data-review-note data-review-variant="${esc(v.id)}" data-review-year="${year}" placeholder="记录本年采购经验，供下年参考…">${esc(note)}</textarea><button class="btn" onclick="openVariant('${v.id}')">详情 →</button></div>`}function reviewQuantityText(txList){const byUnit=groupBy(txList,t=>t.unit||'单位');return Object.entries(byUnit).map(([unit,items])=>`${money(items.reduce((s,t)=>s+(Number(t.quantity)||0),0))} ${esc(unit)}`).join(' / ')||'0'}function priceDeviationBadge(avg,range){if(!range||!avg)return'<span class="badge">暂无均价判断</span>';if(avg<Number(range.low))return'<span class="badge low">低于参考区间</span>';if(avg>Number(range.high))return'<span class="badge high">高于参考区间</span>';return'<span class="badge mid">在参考区间内</span>'}function reviewTimelineCell(v,txList,w){const peak=inRange(w,v.season.peakStartWeek,v.season.peakEndWeek);const hit=txList.some(t=>txWeek(t)===w);return`<span class="review-week ${peak?'peak':''} ${hit?(peak?'hit':'miss'):''}" title="${esc(v.name)} W${w}${hit?' · 有成交':''}"></span>`}function renderZeroTransactionVariants(txList,year){const ids=new Set(txList.map(t=>t.variantId));const items=state.variants.filter(v=>Number(v.priority)<=2&&!ids.has(v.id)).sort((a,b)=>(Number(a.priority)||3)-(Number(b.priority)||3)||a.name.localeCompare(b.name));return`<details class="card" style="margin-top:14px"><summary>⚠️ 零成交品种（${items.length} 个）—— 计划了但本年无记录，请确认是否漏记</summary><div class="review-chip-row">${items.map(v=>`<button class="chip" onclick="openVariant('${v.id}')">${esc(v.name)}</button>`).join('')||'<span class="muted">无</span>'}</div></details>`}function renderSupplierRanking(txList){const byName=groupBy(txList,t=>String(t.supplierName||'未填写供应商').trim()||'未填写供应商');const allRows=Object.entries(byName).map(([name,items])=>{const amount=items.reduce((s,t)=>s+(Number(t.totalAmount)||0),0);const qty=items.reduce((s,t)=>s+(Number(t.quantity)||0),0);const avg=qty?amount/qty:0;const supplierId=items.find(t=>t.supplierId)?.supplierId||(state.suppliers||[]).find(s=>s.name===name)?.id||'';return{name,items,amount,qty,avg,supplierId,variantCount:new Set(items.map(t=>t.variantId)).size}}).sort((a,b)=>b.amount-a.amount);const rows=ui.reviewSupplierExpanded?allRows:allRows.slice(0,10);if(!rows.length)return empty('本年暂无供应商成交');return`<div class="card"><table class="review-table"><thead><tr><th>供应商名</th><th>成交笔数</th><th>总量</th><th>总额</th><th>均价</th><th>供过品种数</th></tr></thead><tbody>${rows.map(r=>`<tr class="${r.supplierId?'clickable':''}" ${r.supplierId?`onclick="openSupplier('${r.supplierId}')"`:''}><td>${esc(r.name)}</td><td>${r.items.length}</td><td>${money(r.qty)}</td><td>¥${money(r.amount)}</td><td>¥${money(r.avg)}</td><td>${r.variantCount}</td></tr>`).join('')}</tbody></table>${allRows.length>10?`<button class="btn" style="margin-top:10px" onclick="ui.reviewSupplierExpanded=!ui.reviewSupplierExpanded;renderReview()">${ui.reviewSupplierExpanded?'收起':'展开全部'}</button>`:''}</div>`}function bindReviewInputs(){document.querySelectorAll('[data-review-note]').forEach(el=>{el.oninput=()=>{clearTimeout(ui.reviewNoteTimer);const variantId=el.dataset.reviewVariant,year=el.dataset.reviewYear,value=el.value;ui.reviewNoteTimer=setTimeout(()=>{state.reviewNotes=(state.reviewNotes&&typeof state.reviewNotes==='object'&&!Array.isArray(state.reviewNotes))?state.reviewNotes:{};(state.reviewNotes[variantId]||(state.reviewNotes[variantId]={}))[year]=value;persistNow();toast('复盘笔记已保存')},500)}})}
function renderOffseason(){const n=nowInfo();const currentWeek=n.week;const zones=classifyVariants(state.variants,currentWeek);const total=zones.lastWindow.length+zones.postPeak.length+zones.offSeason.length;const date=n.date;const body=total?'<div class="offseason-layout">'+renderOffseasonSection('🔴 最后补货窗口',zones.lastWindow,'last',currentWeek,n.year)+renderOffseasonSection('🟡 旺季结束，建议减量',zones.postPeak,'postpeak',currentWeek,n.year)+renderOffseasonDetails(zones.offSeason,currentWeek)+renderOffseasonDistribution(zones)+'</div>':empty('✅ 当前周无需特别关注的淡季品种');document.getElementById('view').innerHTML='<div class="card"><div class="section-title" style="margin:0"><h3>当前第 W'+currentWeek+' 周 · '+(date.getMonth()+1)+'月'+date.getDate()+'日</h3><span class="muted">共 '+total+' 个品种需要关注</span></div></div>'+body}
function renderOffseasonSection(title,items,zone,currentWeek,year){return '<div class="offseason-section"><div class="section-title"><h3>'+title+' · '+items.length+' 个</h3></div><div class="offseason-grid">'+(items.map(v=>renderOffseasonCard(v,zone,currentWeek,offseasonTransactions(v.id,year))).join('')||empty('当前无品种进入该区间'))+'</div></div>'}
function classifyVariants(variants,currentWeek){const out={lastWindow:[],postPeak:[],offSeason:[],inSeason:[]};variants.filter(v=>Number(v.priority)<=2).forEach(v=>{const s=v.season||{};const earliest=Number(s.earliestWeek)||1;const peakStart=Number(s.peakStartWeek)||earliest;const peakEnd=Number(s.peakEndWeek)||peakStart;const end=Number(s.endWeek)||52;const lastStart=normalizeWeek(end-2);const pastPeak=weekDistance(peakEnd,currentWeek);if(inSeasonRange(currentWeek,lastStart,end)){out.lastWindow.push(v);return}if(pastPeak>=1&&pastPeak<=4&&!inSeasonRange(currentWeek,peakStart,peakEnd)){out.postPeak.push(v);return}if(!inSeasonRange(currentWeek,earliest,end)&&weekDistance(currentWeek,earliest)>4){out.offSeason.push(v);return}out.inSeason.push(v)});Object.keys(out).forEach(k=>out[k].sort((a,b)=>(Number(a.priority)||3)-(Number(b.priority)||3)||String(a.name||'').localeCompare(String(b.name||''))));return out}
function inSeasonRange(week,start,end){week=Number(week);start=Number(start);end=Number(end);if(!week||!start||!end)return false;if(start<=end)return week>=start&&week<=end;return week>=start||week<=end}
function offseasonTransactions(variantId,year){return(state.transactions||[]).filter(t=>t.variantId===variantId&&(Number(t.year)||Number(String(t.date||'').slice(0,4)))===Number(year))}
function renderOffseasonCard(v,zone,currentWeek,txList){const s=v.season||{};const cat=catOf(v);const price=v.procurementPrice||{};const qty=txList.reduce((sum,t)=>sum+(Number(t.quantity)||0),0);const amount=txList.reduce((sum,t)=>sum+(Number(t.totalAmount)||0),0);const metric=zone==='last'?'距离下市还有 '+weekDistance(currentWeek,Number(s.endWeek)||52)+' 周':'旺季已于 W'+(Number(s.peakEndWeek)||0)+' 结束，已过 '+weekDistance(Number(s.peakEndWeek)||currentWeek,currentWeek)+' 周';const txText=zone==='last'?(txList.length?('本季成交 '+txList.length+' 笔'):'<span class="warn">本季无成交记录</span>'):(txList.length?('本季成交 '+money(qty)+' · ¥'+money(amount)):'<span class="warn">暂无成交记录</span>');const advice=zone==='last'?'本品种即将下市，如需补货请尽快下单，错过后需等待下年上市':'大量上市期已过，价格可能开始回升，建议减少订货量，消化现有库存';return '<div class="card offseason-card '+zone+'"><div class="section-title" style="margin:0 0 8px"><h3>'+esc(v.name)+'</h3><span class="badge">'+esc(cat.name)+'</span></div><div class="metric">'+metric+'</div><div class="muted">'+txText+'</div><div class="muted">参考采购价：'+money(Number(price.low)||0)+' ~ '+money(Number(price.high)||0)+' '+esc(price.unit||'元/斤')+'</div><p>'+esc(advice)+'</p><button class="btn" onclick="openVariant(\''+esc(v.id)+'\')">去详情</button></div>'}
function renderOffseasonDetails(items,currentWeek){return '<details class="card"><summary>⬜ 采购空窗品种（'+items.length+' 个）——当前完全停采，展开查看预计重新上市周</summary><div class="offseason-list">'+(items.map(v=>{const w=Number(v.season?.earliestWeek)||1;return '<div class="offseason-row"><div><strong>'+esc(v.name)+'</strong><div class="muted">'+esc(catOf(v).name)+' · 距下次上市 '+weekDistance(currentWeek,w)+' 周</div></div><span class="badge">预计 W'+w+'</span><button class="btn" onclick="openVariant(\''+esc(v.id)+'\')">详情</button></div>'}).join('')||empty('当前无采购空窗品种'))+'</div></details>'}
function renderOffseasonDistribution(zones){const rows={};zones.postPeak.forEach(v=>{const g=catOf(v).group;rows[g]=rows[g]||{reduce:0,stop:0};rows[g].reduce++});zones.offSeason.forEach(v=>{const g=catOf(v).group;rows[g]=rows[g]||{reduce:0,stop:0};rows[g].stop++});const max=Math.max(1,...Object.values(rows).flatMap(r=>[r.reduce,r.stop]));const html=Object.entries(rows).sort((a,b)=>(b[1].reduce+b[1].stop)-(a[1].reduce+a[1].stop)).map(([group,r])=>'<div class="offseason-dist-item"><strong>'+esc(group)+'</strong><div class="muted">减量 '+r.reduce+' · 停采 '+r.stop+'</div><div class="offseason-bars"><div class="offseason-bar reduce" title="减量 '+r.reduce+'"><span style="width:'+Math.max(6,r.reduce/max*100)+'%"></span></div><div class="offseason-bar stop" title="停采 '+r.stop+'"><span style="width:'+Math.max(6,r.stop/max*100)+'%"></span></div></div></div>').join('')||empty('暂无减量或停采品类');return '<div class="section-title"><h3>📊 本周淡季品类分布</h3></div><div class="offseason-dist">'+html+'</div>'}
function renderActions(){const acts=filteredActions();const groups=groupBy(acts,a=>`${a.year} W${a.week}${a.week===nowInfo().week?'（本周）':''} · ${weekRange(a.year,a.week)}`);let html;if(ui.actionMode==='variant'){const byVariant=groupBy(acts,a=>a.variantId);const entries=Object.entries(byVariant).sort(([va],[vb])=>{const a=variantById(va),b=variantById(vb);if(!a||!b)return 0;return(a.priority||3)-(b.priority||3)||a.name.localeCompare(b.name)});html=entries.map(([vid,items])=>{const v=variantById(vid);if(!v)return'';const pending=items.filter(a=>a.status==='pending').length;return`<div class="action-group"><h4><button class="btn" onclick="openVariant('${vid}')" style="float:right">详情</button>${esc(v.name)} <span class="muted">· ${items.length} 条 · 待办 ${pending}</span></h4>${items.sort(sortActions).map(actionRow).join('')}</div>`}).join('')||empty('当前筛选下没有行动')}else{html=Object.entries(groups).map(([g,items])=>`<div class="action-group"><h4>${esc(g)} · ${items.length} 条</h4>${items.map(actionRow).join('')}</div>`).join('')||empty('当前筛选下没有行动')}document.getElementById('view').innerHTML=`<div class="filterbar"><button class="btn ${ui.actionMode==='week'?'primary':''}" onclick="ui.actionMode='week';renderActions()">本周</button><button class="btn ${ui.actionMode==='future'?'primary':''}" onclick="ui.actionMode='future';renderActions()">未来 4 周</button><button class="btn ${ui.actionMode==='all'?'primary':''}" onclick="ui.actionMode='all';renderActions()">全部</button><button class="btn ${ui.actionMode==='variant'?'primary':''}" onclick="ui.actionMode='variant';renderActions()">按水果</button><select id="aUrg"><option value="all">全部紧急度</option><option value="高">高紧急</option><option value="中">中紧急</option><option value="低">低紧急</option><option value="overdue">已逾期</option></select><select id="aType"><option value="all">全部动作</option>${actionTemplates.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('')}</select><select id="aStatus"><option value="all">全部状态</option><option value="pending">待处理</option><option value="done">已完成</option><option value="skipped">已跳过</option></select><button class="btn primary" onclick="addManualAction()">新增行动</button><button class="btn" onclick="bulkCompleteVisible()">批量完成本页待处理</button></div>${html}`;['aUrg','aType','aStatus'].forEach(id=>{const el=document.getElementById(id);if(id==='aUrg')el.value=ui.actionUrgency;if(id==='aType')el.value=ui.actionType;if(id==='aStatus')el.value=ui.actionStatus;el.onchange=e=>{if(id==='aUrg')ui.actionUrgency=e.target.value;if(id==='aType')ui.actionType=e.target.value;if(id==='aStatus')ui.actionStatus=e.target.value;renderActions()}})}function filteredActions(){const n=nowInfo();let arr=[...state.actions];if(ui.actionMode==='week')arr=arr.filter(a=>a.year===n.year&&a.week===n.week);else if(ui.actionMode==='future')arr=arr.filter(a=>a.year===n.year&&weekDistance(n.week,a.week)<=4);if(ui.actionUrgency==='overdue')arr=pendingOverdue();else if(ui.actionUrgency!=='all')arr=arr.filter(a=>a.urgency===ui.actionUrgency);if(ui.actionType!=='all')arr=arr.filter(a=>a.templateId===ui.actionType);if(ui.actionStatus!=='all')arr=arr.filter(a=>a.status===ui.actionStatus);return arr.sort(sortActions)}function sortActions(a,b){return a.year-b.year||a.week-b.week||(URGENCY_ORDER[a.urgency]||9)-(URGENCY_ORDER[b.urgency]||9)}function completeAction(id){const a=state.actions.find(x=>x.id===id);a.status='done';a.completedAt=new Date().toISOString();persistNow();render()}function reopenAction(id){const a=state.actions.find(x=>x.id===id);a.status='pending';delete a.completedAt;persistNow();render()}function skipAction(id){const reason=prompt('请输入跳过原因');if(!reason)return;const a=state.actions.find(x=>x.id===id);a.status='skipped';a.notes=reason;persistNow();render()}function rescheduleAction(id){const week=Number(prompt('请输入新的 ISO 周次 1-52'));if(!week||week<1||week>52)return;state.actions.find(x=>x.id===id).week=week;persistNow();render()}function addActionAtWeek(variantId,week){if(!confirm(`在 W${week} 为该变体新增行动？`))return;addManualAction(variantId,week)}function addManualAction(variantId=ui.selectedVariantId,week=nowInfo().week){const v=variantById(variantId)||state.variants[0];const name=prompt('行动名称','手工行动');if(!name)return;state.actions.push({id:'manual-'+Date.now(),variantId:v.id,name,week,year:nowInfo().year,urgency:'中',status:'pending',notes:'',createdAt:new Date().toISOString()});persistNow();render()}function bulkCompleteVisible(){filteredActions().filter(a=>a.status==='pending').forEach(a=>{a.status='done';a.completedAt=new Date().toISOString()});persistNow();renderActions()}function goActions(mode){ui.actionMode='all';if(mode==='overdue')ui.actionUrgency='overdue';if(mode==='lock')ui.actionType='lock-price';location.hash='#/actions';render()}

function openAutofillRefresh(variantId){const v=variantById(variantId);if(!v)return;ui.autofillMode='merge';ui.autofillTarget=variantId;ui.autofillInput={name:v.name,categoryId:v.categoryId,variety:v.variety||'',originText:originText(v),priority:v.priority||2};ui.autofillStep=1;ui.autofillPasted='';ui.autofillParsed=null;ui.autofillError='';const modal=document.getElementById('autofillModal');if(modal)modal.classList.remove('hide');renderAutofillModal()}

function parseAutofillPaste(){try{const normalized=normalizeAutofillJson(ui.autofillPasted||'');const parsed=JSON.parse(normalized);if(!parsed||typeof parsed!=='object'||Array.isArray(parsed))throw new Error('返回内容必须是 JSON 对象');ui.autofillPasted=normalized;ui.autofillParsed=parsed;ui.autofillError='';ui.autofillStep=4}catch(err){ui.autofillParsed=null;ui.autofillError='JSON 解析失败：'+err.message+'。请检查是否使用英文双引号、字段之间是否有逗号。'}renderAutofillModal()}function normalizeAutofillJson(raw){let s=String(raw||'').trim().replace(/^\uFEFF/,'');const fence=String.fromCharCode(96,96,96);if(s.startsWith(fence)){s=s.slice(fence.length).trim();if(s.toLowerCase().startsWith('json'))s=s.slice(4).trim();if(s.endsWith(fence))s=s.slice(0,-fence.length).trim()}s=s.replace(/[“”]/g,'"').replace(/[‘’]/g,"'");return extractLastJsonObject(s)}function extractLastJsonObject(text){let end=text.lastIndexOf('}');if(end<0)return text;let depth=0,inString=false,escape=false;for(let i=end;i>=0;i--){const ch=text[i];if(escape){escape=false;continue}if(ch==='\\'){escape=true;continue}if(ch==='"'){inString=!inString;continue}if(inString)continue;if(ch==='}'){depth++}else if(ch==='{'){depth--;if(depth===0)return text.slice(i,end+1).trim()}}return text.slice(0,end+1).trim()}
function applyAutofill(applyMode){if(!ui.autofillParsed)return;if(ui.autofillMode==='create'){const v=blankVariantTemplate();v.id='autofill-'+Date.now().toString(36);v.name=ui.autofillInput.name;v.categoryId=ui.autofillInput.categoryId;v.priority=Number(ui.autofillInput.priority)||2;Object.keys(ui.autofillParsed).forEach(k=>{if(isLockedAutofillField(k))return;v[k]=mergeAutofillValue(v[k],ui.autofillParsed[k],applyMode,k)});v.name=ui.autofillInput.name;v.categoryId=ui.autofillInput.categoryId;v.priority=Number(ui.autofillInput.priority)||2;state.variants.unshift(v);state.actions=ensureActions(state.variants,state.actions);ui.selectedVariantId=v.id;persistNow();closeAutofill();renderVariants();toast('已创建新变体并应用联网补全');return}const v=variantById(ui.autofillTarget);if(!v)return;Object.keys(ui.autofillParsed).forEach(k=>{if(isLockedAutofillField(k))return;v[k]=mergeAutofillValue(v[k],ui.autofillParsed[k],applyMode,k)});persistNow();closeAutofill();renderVariants();toast('已应用联网补全')}
function renderAutofillModal(){

function autofillPreviewBase(){const v=blankVariantTemplate();v.id='autofill-preview';v.name=ui.autofillInput.name;v.categoryId=ui.autofillInput.categoryId;v.variety=ui.autofillInput.variety||'';v.priority=Number(ui.autofillInput.priority)||2;return v}
function generateAutofillPrompt(){const input=ui.autofillInput||{};const c=baseCategories.find(x=>x.id===input.categoryId)||baseCategories[0];const categoryName=c.name;return `我需要你以专业的中国生鲜水果采购视角，为以下水果变体生成完整的采购档案数据，严格输出符合 Schema 的纯 JSON（不要任何额外文字、不要 markdown 代码块包裹）。

## 变体信息
- 变体名：${input.name}
- 品类：${categoryName}（id: ${input.categoryId}）
- 已知品种：${input.variety || '（请补全）'}
- 已知产地：${input.originText || '（请补全）'}
- 优先级：${input.priority || 2}

## 输出 JSON Schema
{

  "retailPrice": { "unit": "元/斤", "low": number, "typical": number, "high": number },
  "supplierTypes": ["产地合作社", "一级批发商", "代办", "进口贸易商", "品牌商"],
  "risks": [{ "type": "天气 | 品质 | 价格 | 履约 | 物流 | 政策", "description": "string" }],

  "lossRate": { "warehouse": "0-1 小数", "retail": "0-1 小数" },

## 要求

- specs 至少 2 个；risks 1-3 个；negotiationTips 2-3 条
- dataConfidence 默认填 "低"（AI 生成）
- JSON 必须使用英文双引号 "，不要使用中文弯引号 “ ”
- 严格输出纯 JSON，不要 markdown 三引号包裹`}
function renderAutofillDiff(v,data){const current=flattenAutofill(v);const incoming=flattenAutofill(data||{});const keys=Object.keys(incoming).sort();if(!keys.length)return empty('没有可预览字段');return `<div class="autofill-diff"><div class="autofill-diff-row"><div class="autofill-diff-label">字段名</div><div class="autofill-diff-label">当前值</div><div class="autofill-diff-label">LLM值</div><div class="autofill-diff-label">状态</div></div>${keys.map(k=>{const locked=isLockedAutofillField(k);const same=sameAutofillValue(current[k],incoming[k]);const status=locked?'id锁定':same?'一致':isEmptyAutofillValue(current[k])&&!isEmptyAutofillValue(incoming[k])?'新填':'改写';const cls=locked?'locked':status==='新填'?'new':'';return `<div class="autofill-diff-row ${cls}"><div class="autofill-diff-label">${esc(k)}</div><div class="autofill-diff-value">${esc(shortAutofillValue(current[k]))}</div><div class="autofill-diff-value">${esc(shortAutofillValue(incoming[k]))}</div><div><span class="badge ${status==='改写'?'mid':status==='新填'?'low':''}">${status}</span></div></div>`}).join('')}</div>`}
function flattenAutofill(obj,prefix='',out={}){if(!obj||typeof obj!=='object'||Array.isArray(obj)){if(prefix)out[prefix]=obj;return out}Object.keys(obj).forEach(k=>{const val=obj[k];const path=prefix?prefix+'.'+k:k;if(val&&typeof val==='object'&&!Array.isArray(val))flattenAutofill(val,path,out);else out[path]=val});return out}
function shortAutofillValue(value){if(value===undefined)return '';const text=typeof value==='string'?value:JSON.stringify(value);return String(text??'').length>140?String(text??'').slice(0,137)+'...':String(text??'')}
function sameAutofillValue(a,b){return JSON.stringify(a??null)===JSON.stringify(b??null)}
function isLockedAutofillField(path){return ['id','categoryId','name'].includes(String(path).split('.')[0])}
function isPlainAutofillObject(value){return !!value&&typeof value==='object'&&!Array.isArray(value)}
function isEmptyAutofillValue(value){return value===null||value===undefined||value===''||value===0||(Array.isArray(value)&&value.length===0)||(isPlainAutofillObject(value)&&Object.keys(value).length===0)}
function mergeAutofillValue(current,next,mode,path){if(isLockedAutofillField(path))return current;if(Array.isArray(next))return mode==='overwrite-all'||isEmptyAutofillValue(current)?clone(next):current;if(isPlainAutofillObject(next)){const base=isPlainAutofillObject(current)?clone(current):{};Object.keys(next).forEach(k=>{base[k]=mergeAutofillValue(base[k],next[k],mode,(path?path+'.':'')+k)});return mode==='overwrite-all'||!isEmptyAutofillValue(current)?base:clone(next)}return mode==='overwrite-all'||isEmptyAutofillValue(current)?next:current}
function bindGlobal(){document.getElementById('weekBadge').onclick=()=>{location.hash='#/calendar';setTimeout(()=>document.querySelector('.week-now')?.scrollIntoView({inline:'center',block:'nearest'}),50)};['exportBtn','sideExport'].forEach(id=>document.getElementById(id).onclick=exportJson);['importBtn','sideImport'].forEach(id=>document.getElementById(id).onclick=()=>document.getElementById('importFile').click());['resetBtn','sideReset'].forEach(id=>document.getElementById(id).onclick=resetData);document.getElementById('importFile').onchange=importJson;document.getElementById('globalSearch').onkeydown=e=>{if(e.key==='Enter')searchVariant(e.target.value)};window.addEventListener('hashchange',render);bootstrapSync().then(()=>{if(syncTimer)clearInterval(syncTimer);syncTimer=setInterval(pollSync,SYNC_POLL_MS)})}function searchVariant(q){q=String(q||'').trim();if(!q)return;const hit=state.variants.find(v=>[v.name,v.variety,originText(v),(v.tags||[]).join(' ')].join(' ').includes(q));if(hit)openVariant(hit.id);else toast('没有找到匹配变体')}function exportJson(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json;charset=utf-8'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`procurement-plan-v1-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(a.href);toast('已导出 JSON')}function importJson(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=()=>{try{const s=JSON.parse(r.result);if(s.schemaVersion!==1||!Array.isArray(s.variants)||!Array.isArray(s.actions))throw new Error('invalid');state=normalizeStateShape(s);state.actions=ensureActions(state.variants,state.actions);persistNow();render();toast('已导入 JSON')}catch(err){alert('导入失败：文件结构不符合 procurement-plan-v1')}};r.readAsText(file);e.target.value=''}function resetData(){if(!confirm('确认清空 localStorage 并恢复初始数据？'))return;localStorage.removeItem(STORAGE_KEY);state=parseInitialStorage();state.actions=ensureActions(state.variants,[]);persistNow();render();toast('已恢复初始数据')}function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>el.classList.remove('show'),1800)}function money(n){const num=Number(n)||0;return num.toLocaleString('zh-CN',{maximumFractionDigits:2})}function percent(n){return Math.round((Number(n)||0)*100)+'%'}function groupBy(arr,fn){return arr.reduce((m,x)=>{const k=fn(x);(m[k]||(m[k]=[])).push(x);return m},{})}function originText(v){const o=v.origin||{};return[o.country,o.province,o.city,o.county].filter(Boolean).join(' / ')}function esc(v){return String(v??'').replace(/[&<>"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]))}function empty(text){return`<div class="empty">${esc(text)}</div>`}
function renderSuppliers(){const suppliers=(state.suppliers||[]).filter(s=>s.status!=='dormant');const rows=suppliers.map(s=>'<div class="card supplier-card '+(ui.selectedSupplierId===s.id?'active':'')+'" onclick="openSupplier(\''+esc(s.id)+'\')"><h3>'+esc(s.name||'未命名供应商')+'</h3><div class="supplier-meta"><span>'+esc([s.province,s.city].filter(Boolean).join(' / ')||'未填写产地')+'</span><span>联系人：'+esc(s.contactPerson||'未填写')+' · '+esc(s.phone||'未填写')+'</span><span>评级：'+(Number(s.rating)||0)+' 星 · 合作 '+(Number(s.yearsCooperated)||0)+' 年</span></div></div>').join('')||empty('暂无供应商档案');const selected=(state.suppliers||[]).find(s=>s.id===ui.selectedSupplierId);document.getElementById('view').innerHTML='<div class="filterbar"><button class="btn primary" onclick="newSupplier()">新增供应商</button><span class="muted">供应商档案用于成交复盘和采购追踪</span></div><div class="supplier-grid">'+rows+'</div>'+(selected?renderSupplierDrawer(selected):'')}

Object.assign(window,{openVariant,selectVariant,newVariant,copyVariant,deleteVariant,openSupplier,newSupplier,closeSupplier,saveSupplierAndClose,deleteSupplier,addTransaction,removeTransaction,addArrayRow,removeArrayRow,addListRow,removeListRow,completeAction,reopenAction,skipAction,rescheduleAction,addManualAction,addActionAtWeek,bulkCompleteVisible,goActions,openAutofill,openAutofillNew,openAutofillRefresh,closeAutofill,submitAutofillInput,advanceAutofill,copyAutofillPrompt,setAutofillPasted,parseAutofillPaste,applyAutofill});
