<script>
const STORAGE_KEY='procurement-plan-v1';
const ACTION_STATUS={pending:'待处理',done:'已完成',skipped:'已跳过'};
const URGENCY_ORDER={'高':1,'中':2,'低':3};
const GROUP_COLORS={'仁果类':'#d96f6f','核果类':'#e6a23c','柑橘类':'#f4c842','浆果类':'#9b59b6','热带亚热带':'#27ae60','瓜类':'#3498db','时令特色':'#e67e22','进口高端':'#34495e','其他':'#66736c'};
const ROUTES=[['#/dashboard','仪表盘'],['#/calendar','全年日历'],['#/variants','水果管理'],['#/suppliers','供应商'],['#/actions','行动清单'],['#/festivals','节庆档']];
const FESTIVALS=[{id:'newyear',name:'元旦',startWeek:1,endWeek:1,emoji:'🎊'},{id:'spring',name:'春节',startWeek:4,endWeek:8,emoji:'🧧'},{id:'lantern',name:'元宵',startWeek:7,endWeek:8,emoji:'🏮'},{id:'qingming',name:'清明',startWeek:14,endWeek:15,emoji:'🌿'},{id:'labor',name:'五一',startWeek:18,endWeek:19,emoji:'🛠'},{id:'dragon-boat',name:'端午',startWeek:22,endWeek:24,emoji:'🐲'},{id:'mid-autumn',name:'中秋',startWeek:37,endWeek:39,emoji:'🥮'},{id:'national',name:'国庆',startWeek:40,endWeek:41,emoji:'🇨🇳'},{id:'double11',name:'双11',startWeek:44,endWeek:45,emoji:'🛒'},{id:'double12',name:'双12',startWeek:49,endWeek:50,emoji:'🛒'},{id:'christmas',name:'圣诞',startWeek:52,endWeek:52,emoji:'🎄'}];
const baseCategories=JSON.parse(document.getElementById('data-categories').textContent).categories;
const baseVariants=JSON.parse(document.getElementById('data-variants').textContent).variants;
const actionTemplates=JSON.parse(document.getElementById('data-actionTemplates').textContent).templates;
let state=loadState();
let ui={selectedVariantId:state.variants[0]?.id||'',selectedSupplierId:'',supplierQuery:'',supplierProvince:'all',supplierRating:'all',editingSection:null,editBackup:null,treeQuery:'',actionMode:'week',actionUrgency:'all',actionStatus:'all',actionType:'all',group:'all',originType:'all',priority:'all',tag:'all',sort:'season',saveTimer:null,autofillStep:0,autofillTarget:null,autofillPasted:'',autofillParsed:null,autofillError:'',autofillMode:'merge',autofillInput:{name:'',categoryId:'',variety:'',originText:'',priority:2}};
function clone(x){return JSON.parse(JSON.stringify(x))}function nowInfo(){const d=new Date();return{year:d.getFullYear(),week:isoWeek(d),month:d.getMonth()+1,date:d}}function isoWeek(date){const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));const day=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-day);const start=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil((((d-start)/86400000)+1)/7)}function weekRange(year,week){const jan4=new Date(year,0,4);const day=jan4.getDay()||7;const monday=new Date(jan4);monday.setDate(jan4.getDate()-day+1+(week-1)*7);const sunday=new Date(monday);sunday.setDate(monday.getDate()+6);return `${monday.getMonth()+1} 月 ${monday.getDate()}-${sunday.getMonth()+1} 月 ${sunday.getDate()}`}
function parseInitialStorage(){return{schemaVersion:1,variants:clone(baseVariants),actions:[],suppliers:[],transactions:[],meta:{lastSavedAt:new Date().toISOString()}}}function loadState(){let s=parseInitialStorage();const isFirstOpen=!localStorage.getItem(STORAGE_KEY);try{const raw=localStorage.getItem(STORAGE_KEY);if(raw){const saved=JSON.parse(raw);s={schemaVersion:1,variants:mergeVariants(saved.variants||[]),actions:saved.actions||[],suppliers:Array.isArray(saved.suppliers)?saved.suppliers:[],transactions:Array.isArray(saved.transactions)?saved.transactions:[],priceHistory:saved.priceHistory,meta:{lastSavedAt:saved.meta?.lastSavedAt??new Date().toISOString(),user:saved.meta?.user}}}}catch(e){console.warn('localStorage parse failed',e)}const generatedActions=s.actions.length;s.actions=ensureActions(s.variants,s.actions);const actionsChanged=s.actions.length!==generatedActions;if(isFirstOpen||actionsChanged){if(isFirstOpen)s.meta.lastSavedAt='';localStorage.setItem(STORAGE_KEY,JSON.stringify(s))}return s}function mergeVariants(saved){const byId=new Map(baseVariants.map(v=>[v.id,clone(v)]));saved.forEach(v=>byId.set(v.id,v));return[...byId.values()]}function persistNow(s=state){s.meta.lastSavedAt=new Date().toISOString();localStorage.setItem(STORAGE_KEY,JSON.stringify(s));updateSavedBadge(s);pushRemoteState()}
const SYNC_URL='/state';const SYNC_POLL_MS=10000;let lastPushedSerialized='';let syncTimer=null;
async function fetchRemoteState(){try{const r=await fetch(SYNC_URL,{cache:'no-store'});if(!r.ok)return null;const text=await r.text();if(!text||text.trim()==='{}')return null;const obj=JSON.parse(text);return(obj&&obj.meta)?obj:null}catch(e){return null}}
async function pushRemoteState(){const body=JSON.stringify(state);if(body===lastPushedSerialized)return;try{const r=await fetch(SYNC_URL,{method:'POST',headers:{'Content-Type':'application/json'},body});if(r.ok){lastPushedSerialized=body;updateSyncBadge('已同步 '+new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),'ok')}else{updateSyncBadge('服务器拒绝 '+r.status,'warn')}}catch(e){updateSyncBadge('离线 — 仅本地','warn')}}
function updateSyncBadge(text,kind){const el=document.getElementById('syncBadge');if(!el)return;el.textContent=text;el.classList.remove('sync-ok','sync-warn');if(kind==='ok')el.classList.add('sync-ok');if(kind==='warn')el.classList.add('sync-warn')}
async function bootstrapSync(){const remote=await fetchRemoteState();if(!remote){await pushRemoteState();return}const localTs=new Date(state.meta?.lastSavedAt||0).getTime();const remoteTs=new Date(remote.meta?.lastSavedAt||0).getTime();if(remoteTs>localTs){state=remote;state.actions=ensureActions(state.variants,state.actions);localStorage.setItem(STORAGE_KEY,JSON.stringify(state));render();toast('已从其他设备同步数据')}else if(localTs>remoteTs){await pushRemoteState()}else{updateSyncBadge('已同步','ok')}}
async function pollSync(){if(ui.editingSection||ui.autofillStep)return;const remote=await fetchRemoteState();if(!remote||!remote.meta)return;const localTs=new Date(state.meta?.lastSavedAt||0).getTime();const remoteTs=new Date(remote.meta?.lastSavedAt||0).getTime();if(remoteTs>localTs){state=remote;state.actions=ensureActions(state.variants,state.actions);localStorage.setItem(STORAGE_KEY,JSON.stringify(state));render();toast('已同步其他设备改动');updateSyncBadge('已同步 '+new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),'ok')}}function scheduleSave(){clearTimeout(ui.saveTimer);ui.saveTimer=setTimeout(()=>{persistNow();toast('已自动保存');updateSavedBadge(state)},1000)}
function ensureActions(variants,actions){const n=nowInfo();const map=new Map(actions.map(a=>[actionKey(a),a]));variants.forEach(v=>{const peakYear=(v.season.peakStartWeek>=n.week)?n.year:n.year+1;actionTemplates.forEach(t=>{const naive=v.season.peakStartWeek+t.defaultOffsetWeeks;let actionYear=peakYear,actionWeek;if(naive<1){actionYear=peakYear-1;actionWeek=naive+52}else if(naive>52){actionYear=peakYear+1;actionWeek=naive-52}else{actionWeek=naive}const key=`${v.id}|${t.id}|${actionYear}`;if(!map.has(key)){map.set(key,{id:`auto-${actionYear}-${v.id}-${t.id}`,variantId:v.id,templateId:t.id,name:t.name,week:actionWeek,year:actionYear,urgency:t.urgency,status:'pending',notes:'',createdAt:new Date().toISOString()})}})});return[...map.values()]}function actionKey(a){return`${a.variantId}|${a.templateId||a.id}|${a.year}`}function normalizeWeek(w){while(w<1)w+=52;while(w>52)w-=52;return w}function catOf(v){return baseCategories.find(c=>c.id===v.categoryId)||{id:v.categoryId,name:v.categoryId,group:'其他'}}function variantById(id){return state.variants.find(v=>v.id===id)}
function render(){renderNav();const route=ROUTES.some(r=>r[0]===location.hash)?location.hash:'#/dashboard';if(location.hash!==route)location.hash=route;document.getElementById('pageTitle').textContent=ROUTES.find(r=>r[0]===route)[1];document.getElementById('weekBadge').textContent=weekBadgeText();if(route==='#/dashboard')renderDashboard();if(route==='#/calendar')renderCalendar();if(route==='#/variants')renderVariants();if(route==='#/suppliers')renderSuppliers();if(route==='#/actions')renderActions();if(route==='#/festivals')renderFestivals();updateSavedBadge(state)}function renderNav(){document.getElementById('nav').innerHTML=ROUTES.map(([hash,name])=>`<a class="${location.hash===hash?'active':''}" href="${hash}"><span class="mark"></span>${name}</a>`).join('')}function weekBadgeText(){const n=nowInfo();return`${n.year} W${n.week} · ${weekRange(n.year,n.week)}`}function updateSavedBadge(source){const el=document.getElementById('weekBadge');if(!el||!source?.meta)return;el.title=source.meta.lastSavedAt?`已保存于 ${new Date(source.meta.lastSavedAt).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}，点击跳转本周日历`:'尚未编辑，点击跳转本周日历'}
function renderDashboard(){const n=nowInfo();const monthWeeks=monthWeekSet(n.year,n.month);const monthLaunch=state.variants.filter(v=>monthWeeks.has(v.season.peakStartWeek));const monthActions=state.actions.filter(a=>a.year===n.year&&monthWeeks.has(a.week)&&a.status==='pending');const overdue=pendingOverdue();const lock=state.actions.filter(a=>a.status==='pending'&&a.templateId==='lock-price');const upcoming=state.variants.filter(v=>weekDistance(n.week,v.season.peakStartWeek)<=4).sort((a,b)=>weekDistance(n.week,a.season.peakStartWeek)-weekDistance(n.week,b.season.peakStartWeek)).slice(0,8);const weekActions=state.actions.filter(a=>a.year===n.year&&a.week===n.week&&a.status==='pending').sort(sortActions);const priorityActions=state.actions.filter(a=>a.status==='pending'&&a.year===n.year&&a.week===n.week).sort((a,b)=>{const u=(URGENCY_ORDER[a.urgency]||9)-(URGENCY_ORDER[b.urgency]||9);if(u!==0)return u;if(a.templateId==='lock-price'&&b.templateId!=='lock-price')return-1;if(b.templateId==='lock-price'&&a.templateId!=='lock-price')return 1;return a.week-b.week}).slice(0,5);const weekTotal=state.actions.filter(a=>a.status==='pending'&&a.year===n.year&&a.week===n.week).length;const peakStartThisWeek=state.variants.filter(v=>v.season.peakStartWeek===n.week);const lowPriceNow=state.variants.filter(v=>inRange(n.week,v.season.lowPriceWeekStart,v.season.lowPriceWeekEnd));const stableQualityNow=state.variants.filter(v=>inRange(n.week,v.season.stableQualityWeekStart,v.season.stableQualityWeekEnd));const endingSoon=state.variants.filter(v=>{const d=weekDistance(n.week,v.season.endWeek);return d>0&&d<=4});document.getElementById('view').innerHTML=`<div class="card priority-card"><div class="section-title" style="margin:0 0 12px"><h3>本周必做 · W${n.week}</h3><span class="muted">本周共 ${weekTotal} 条待办 · 已逾期 ${overdue.length} 条</span></div><div class="list">${priorityActions.map(actionRow).join('')||'<div class="empty">本周无紧急行动 ✓</div>'}</div>${weekTotal>5?`<div class="muted" style="margin-top:8px">查看全部 ${weekTotal} 条 → <a href="#/actions" onclick="ui.actionMode='week'">行动清单</a></div>`:''}</div><div class="grid4" style="margin-top:14px"><div class="card kpi" onclick="goActions('month')"><strong>${monthLaunch.length}</strong><span>本月即上市</span></div><div class="card kpi" onclick="goActions('month')"><strong>${monthActions.length}</strong><span>本月待办行动，高紧急 ${monthActions.filter(a=>a.urgency==='高').length} 条</span></div><div class="card kpi" onclick="goActions('overdue')"><strong>${overdue.length}</strong><span>已逾期行动</span></div><div class="card kpi" onclick="goActions('lock')"><strong>${lock.length}</strong><span>锁价待签</span></div></div><div class="radar-grid">${radarCard(peakStartThisWeek,'🎯 本周大量上市开始',v=>esc(catOf(v).name))}${radarCard(lowPriceNow,'💰 本周价格洼地',v=>'W'+v.season.lowPriceWeekStart+'-W'+v.season.lowPriceWeekEnd)}${radarCard(stableQualityNow,'⭐ 本周品质稳定窗口',v=>'W'+v.season.stableQualityWeekStart+'-W'+v.season.stableQualityWeekEnd)}${radarCard(endingSoon,'📅 4 周内即将下市',v=>'W'+v.season.endWeek)}</div><div class="section-title"><h3>即将上市 · 未来 4 周</h3><button class="btn" onclick="location.hash='#/calendar'">查看日历</button></div><div class="list">${upcoming.map(v=>variantRow(v,`进入大量期还有 ${weekDistance(n.week,v.season.peakStartWeek)} 周`)).join('')||empty('未来 4 周没有进入大量期的变体')}</div><div class="section-title"><h3>本周行动建议</h3><button class="btn primary" onclick="location.hash='#/actions'">立即查看</button></div><div class="list">${weekActions.map(actionRow).join('')||empty('本周暂无待处理行动')}</div><details class="card" style="margin-top:14px"><summary>已逾期 · ${overdue.length} 条</summary><div class="list" style="margin-top:10px">${overdue.map(actionRow).join('')||empty('暂无逾期行动')}</div></details>${dashboardAnalysisHtml()}`}function radarCard(items,label,metaFn){return`<details class="card radar-card"><summary><strong>${items.length}</strong> <span>${label}</span></summary><div class="list" style="margin-top:8px">${items.map(v=>variantRow(v,metaFn(v))).join('')||empty('暂无')}</div></details>`}function weeklyCount(w){return state.variants.filter(v=>weekPhase(v.season,w)==='peak').length}function dashboardAnalysisHtml(){const counts=weeks().map(w=>weeklyCount(w));const max=Math.max(...counts),min=Math.min(...counts);const crowded=counts.map((c,i)=>({week:i+1,count:c})).filter(x=>x.count===max).map(x=>'W'+x.week).join(' / ');const sparse=counts.map((c,i)=>({week:i+1,count:c})).filter(x=>x.count===min).map(x=>'W'+x.week).join(' / ');const riskCounts={天气:0,品质:0,价格:0,履约:0,物流:0,政策:0};state.variants.forEach(v=>(v.risks||[]).forEach(r=>riskCounts[r.type]=(riskCounts[r.type]||0)+1));const maxRisk=Math.max(1,...Object.values(riskCounts));const riskHtml=Object.entries(riskCounts).sort((a,b)=>b[1]-a[1]).map(([type,count])=>`<div class="risk-bar" style="width:${Math.max(8,count/maxRisk*100)}%">${esc(type)} ${count}</div>`).join('');const countByOrigin={国产:0,进口:0,混合:0};state.variants.forEach(v=>countByOrigin[v.originType]=(countByOrigin[v.originType]||0)+1);const total=Math.max(1,state.variants.length);const originColors={国产:'var(--green)',进口:'var(--blue)',混合:'var(--gold)'};const originStack=Object.entries(countByOrigin).map(([type,count])=>`<span style="width:${count/total*100}%;background:${originColors[type]||'var(--muted)'}" title="${type}: ${count}">${count?type:''}</span>`).join('');return`<div class="section-title"><h3>全年覆盖与风险分析</h3></div><div class="analysis-grid"><div class="card"><h3>全年每周可选品类数</h3><div class="weekly-density">${weeks().map(w=>`<div class="dw" style="height:${Math.min(weeklyCount(w)*4,250)}px" title="W${w}: ${weeklyCount(w)} 个变体在大量期"></div>`).join('')}</div><div class="muted" style="margin-top:8px">最拥挤：${crowded}（${max} 个） · 最空档：${sparse}（${min} 个）</div></div><div class="card"><h3>风险类型分布</h3>${riskHtml}</div><div class="card"><h3>进口 / 国产 / 混合占比</h3><div class="origin-stack">${originStack}</div><div class="list" style="margin-top:10px">${Object.entries(countByOrigin).map(([k,v])=>`<div class="row"><span>${esc(k)}</span><strong>${v}</strong></div>`).join('')}</div></div></div>`}function monthWeekSet(year,month){const set=new Set();for(let d=new Date(year,month-1,1);d.getMonth()===month-1;d.setDate(d.getDate()+1))set.add(isoWeek(d));return set}function weekDistance(from,to){return to>=from?to-from:52-from+to}function pendingOverdue(){const n=nowInfo();return state.actions.filter(a=>a.status==='pending'&&(a.year<n.year||(a.year===n.year&&a.week<n.week))).sort(sortActions)}function variantRow(v,meta){const c=catOf(v);return`<div class="row" onclick="openVariant('${v.id}')"><div class="row-main"><div class="row-title">${esc(v.name)}</div><div class="row-sub">${esc(c.name)} · ${esc(originText(v))} · ${esc((v.tags||[]).join(' / '))}</div></div><span class="badge">${meta}</span></div>`}function actionRow(a){const v=variantById(a.variantId);const t=actionTemplates.find(x=>x.id===a.templateId);const cls=a.urgency==='高'?'high':a.urgency==='中'?'mid':'low';return`<div class="row ${a.status==='done'?'status-done':''} ${a.status==='skipped'?'status-skipped':''}"><div class="row-main"><div class="row-title"><span class="badge ${cls}">${a.urgency}</span> ${esc(v?.name||a.variantId)} · ${esc(a.name)}</div><div class="row-sub">${a.year} W${a.week} · ${weekRange(a.year,a.week)} · ${ACTION_STATUS[a.status]}${a.completedAt?' · 完成于 '+new Date(a.completedAt).toLocaleDateString('zh-CN'):''}</div>${t?.checklist?`<details><summary class="muted">操作清单</summary><ul>${t.checklist.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></details>`:''}</div><div class="tools">${a.status==='pending'?`<button class="btn" onclick="completeAction('${a.id}')">完成</button><button class="btn" onclick="rescheduleAction('${a.id}')">改期</button><button class="btn" onclick="skipAction('${a.id}')">跳过</button>`:`<button class="btn" onclick="reopenAction('${a.id}')">恢复</button>`}<button class="btn" onclick="openVariant('${a.variantId}')">详情</button></div></div>`}
function renderCalendar(){const groups=[...new Set(baseCategories.map(c=>c.group))];const tags=[...new Set(state.variants.flatMap(v=>v.tags||[]))].sort();const variants=filteredVariants();document.getElementById('view').innerHTML=`<div class="filterbar"><select id="fGroup"><option value="all">全部分组</option>${groups.map(g=>`<option ${ui.group===g?'selected':''}>${g}</option>`).join('')}</select><select id="fOrigin"><option value="all">国产/进口</option><option ${ui.originType==='国产'?'selected':''}>国产</option><option ${ui.originType==='进口'?'selected':''}>进口</option><option ${ui.originType==='混合'?'selected':''}>混合</option></select><select id="fPriority"><option value="all">全部优先级</option><option value="1" ${ui.priority==='1'?'selected':''}>优先级 1</option><option value="2" ${ui.priority==='2'?'selected':''}>优先级 2</option><option value="3" ${ui.priority==='3'?'selected':''}>优先级 3</option></select><select id="fTag"><option value="all">全部标签</option>${tags.map(t=>`<option ${ui.tag===t?'selected':''}>${esc(t)}</option>`).join('')}</select><select id="fSort"><option value="season" ${ui.sort==='season'?'selected':''}>按上市期</option><option value="category" ${ui.sort==='category'?'selected':''}>按品类</option><option value="priority" ${ui.sort==='priority'?'selected':''}>按优先级</option></select><button class="btn" disabled>按月</button><button class="btn" disabled>按旬</button><button class="btn primary">按周</button></div><div class="calendar-wrap"><div class="calendar"><div class="week-ruler"><div class="name-cell">变体 / 周次</div>${weeks().map(w=>`<div class="week-cell ${w===nowInfo().week?'week-now today-label':''}">${w===nowInfo().week?'今':''}W${w}</div>`).join('')}</div>${renderCalendarRows(variants)}</div></div>`;bindCalendarFilters();setTimeout(()=>document.querySelector('.calendar-wrap .week-now')?.scrollIntoView({inline:'center',block:'nearest'}),50)}function filteredVariants(){let arr=[...state.variants];if(ui.group!=='all')arr=arr.filter(v=>catOf(v).group===ui.group);if(ui.originType!=='a function variantInputChanged(){if(ui.editingSection)updateSavedBadge(state);else scheduleSave()}function variantStructureChanged(){if(!ui.editingSection)scheduleSave();renderVariants()}function bindVariantInputs(){const v=variantById(ui.selectedVariantId);if(!v)return;document.querySelectorAll('[data-path]').forEach(el=>el.oninput=()=>{setPath(v,el.dataset.path,coerce(el.value,el.type));if(el.dataset.path==='tags')v.tags=splitList(el.value);if(el.dataset.path==='priceTrend.notableEvents')setPath(v,el.dataset.path,splitList(el.value));variantInputChanged()});document.querySelectorAll('[data-array]').forEach(el=>el.oninput=()=>{const arr=getPath(v,el.dataset.array);arr[Number(el.dataset.index)][el.dataset.key]=coerce(el.value,el.type);variantInputChanged()});document.querySelectorAll('[data-list]').forEach(el=>el.oninput=()=>{getPath(v,el.dataset.list)[Number(el.dataset.index)]=el.value;variantInputChanged()});bindTransactionInputs();const s=document.getElementById('saveText');if(s)s.textContent=new Date(state.meta.lastSavedAt).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}function setPath(obj,path,value){const parts=path.split('.');let cur=obj;while(parts.length>1){const p=parts.shift();if(!cur[p])cur[p]={};cur=cur[p]}cur[parts[0]]=value}function getPath(obj,path){return path.split('.').reduce((o,k)=>o?.[k],obj)}function coerce(value,type){return type==='number'?Number(value):value}function splitList(s){return String(s||'').split(/[,，]/).map(x=>x.trim()).filter(Boolean)}function selectVariant(id){ui.selectedVariantId=id;renderVariants()}function openVariant(id){ui.selectedVariantId=id;location.hash='#/variants';render()}function blankVariantTemplate(){return{id:'',name:'新增变体',variety:'',categoryId:baseCategories[0].id,originType:'国产',origin:{},season:{earliestWeek:1,peakStartWeek:1,peakEndWeek:52,lowPriceWeekStart:1,lowPriceWeekEnd:52,stableQualityWeekStart:1,stableQualityWeekEnd:52,endWeek:52},specs:[],procurementPrice:{unit:'元/斤',low:0,typical:0,hig function renderActions(){const acts=filteredActions();const groups=groupBy(acts,a=>`${a.year} W${a.week}${a.week===nowInfo().week?'（本周）':''} · ${weekRange(a.year,a.week)}`);let html;if(ui.actionMode==='variant'){const byVariant=groupBy(acts,a=>a.variantId);const entries=Object.entries(byVariant).sort(([va],[vb])=>{const a=variantById(va),b=variantById(vb);if(!a||!b)return 0;return(a.priority||3)-(b.priority||3)||a.name.localeCompare(b.name)});html=entries.map(([vid,items])=>{const v=variantById(vid);if(!v)return'';const pending=items.filter(a=>a.status==='pending').length;return`<div class="action-group"><h4><button class="btn" onclick="openVariant('${vid}')" style="float:right">详情</button>${esc(v.name)} <span class="muted">· ${items.length} 条 · 待办 ${pending}</span></h4>${items.sort(sortActions).map(actionRow).join('')}</div>`}).join('')||empty('当前筛选下没有行动')}else{html=Object.entries(groups).map(([g,items])=>`<div class="action-group"><h4>${esc(g)} · ${items.length} 条</h4>${items.map(actionRow).join('')}</div>`).join('')||empty('当前筛选下没有行动')}document.getElementById('view').innerHTML=`<div class="filterbar"><button class="btn ${ui.actionMode==='week'?'primary':''}" onclick="ui.actionMode='week';renderActions()">本周</button><button class="btn ${ui.actionMode==='future'?'primary':''}" onclick="ui.actionMode='future';renderActions()">未来 4 周</button><button class="btn ${ui.actionMode==='all'?'primary':''}" onclick="ui.actionMode='all';renderActions()">全部</button><button class="btn ${ui.actionMode==='variant'?'primary':''}" onclick="ui.actionMode='variant';renderActions()">按水果</button><select id="aUrg"><option value="all">全部紧急度</option><option value="高">高紧急</option><option value="中">中紧急</option><option value="低">低紧急</option><option value="overdue">已逾期</option></select><select id="aType"><option value="all">全部动作</option>${actionTemplates.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('')}</select><select id="aStatus"><option value="all">全部状态</option><option value="pending">待处理</option><option value="done">已完成</option><option value="skipped">已跳过</option></select><button class="btn primary" onclick="addManualAction()">新增行动</button><button class="btn" onclick="bulkCompleteVisible()">批量完成本页待处理</button></div>${html}`;['aUrg','aType','aStatus'].forEach(id=>{const el=document.getElementById(id);if(id==='aUrg')el.value=ui.actionUrgency;if(id==='aType')el.value=ui.actionType;if(id==='aStatus')el.value=ui.actionStatus;el.onchange=e=>{if(id==='aUrg')ui.actionUrgency=e.target.value;if(id==='aType')ui.actionType=e.target.value;if(id==='aStatus')ui.actionStatus=e.target.value;renderActions()}})}function filteredActions(){const n=nowInfo();let arr=[...state.actions];if(ui.actionMode==='week')arr=arr.filter(a=>a.year===n.year&&a.week===n.week);else if(ui.actionMode==='future')arr=arr.filter(a=>a.year===n.year&&weekDistance(n.week,a.week)<=4);if(ui.actionUrgency==='overdue')arr=pendingOverdue();else if(ui.actionUrgency!=='all')arr=arr.filter(a=>a.urgency===ui.actionUrgency);if(ui.actionType!=='all')arr=arr.filter(a=>a.templateId===ui.actionType);if(ui.actionStatus!=='all')arr=arr.filter(a=>a.status===ui.actionStatus);return arr.sort(sortActions)}function sortActions(a,b){return a.year-b.year||a.week-b.week||(URGENCY_ORDER[a.urgency]||9)-(URGENCY_ORDER[b.urgency]||9)}function completeAction(id){const a=state.actions.find(x=>x.id===id);a.status='done';a.completedAt=new Date().toISOString();persistNow();render()}function reopenAction(id){const a=state.actions.find(x=>x.id===id);a.status='pending';delete a.completedAt;persistNow();render()}function skipAction(id){const reason=prompt('请输入跳过原因');if(!reason)return;const a=state.actions.find(x=>x.id===id);a.status='skipped';a.notes=reason;persistNow();render()}function rescheduleAction(id){const week=Number(prompt('请输入新的 ISO 周次 1-52'));if(!week||week<1||week>52)return;state.actions.find(x=>x.id===id).week=week;persistNow();render()}function addActionAtWeek(variantId,week){if(!confirm(`在 W${week} 为该变体新增行动？`))return;addManualAction(variantId,week)}function addManualAction(variantId=ui.selectedVariantId,week=nowInfo().week){const v=variantById(variantId)||state.variants[0];const name=prompt('行动名称','手工行动');if(!name)return;state.actions.push({id:'manual-'+Date.now(),variantId:v.id,name,week,year:nowInfo().year,urgency:'中',status:'pending',notes:'',createdAt:new Date().toISOString()});persistNow();render()}function bulkCompleteVisible(){filteredActions().filter(a=>a.status==='pending').forEach(a=>{a.status='done';a.completedAt=new Date().toISOString()});persistNow();renderActions()}function goActions(mode){ui.actionMode='all';if(mode==='overdue')ui.actionUrgency='overdue';if(mode==='lock')ui.actionType='lock-price';location.hash='#/actions';render()}

function applyAutofill(applyMode){if(!ui.autofillParsed)return;if(ui.autofillMode==='create'){const v=blankVariantTemplate();v.id='autofill-'+Date.now().toString(36);v.name=ui.autofillInput.name;v.categoryId=ui.autofillInput.categoryId;v.priority=Number(ui.autofillInput.priority)||2;Object.keys(ui.autofillParsed).forEach(k=>{if(isLockedAutofillField(k))return;v[k]=mergeAutofillValue(v[k],ui.autofillParsed[k],applyMode,k)});v.name=ui.autofillInput.name;v.categoryId=ui.autofillInput.categoryId;v.priority=Number(ui.autofillInput.priority)||2;state.variants.unshift(v);state.actions=ensureActions(state.variants,state.actions);ui.selectedVariantId=v.id;persistNow();closeAutofill();renderVariants();toast('已创建新变体并应用联网补全');return}const v=variantById(ui.autofillTarget);if(!v)return;Object.keys(ui.autofillParsed).forEach(k=>{if(isLockedAutofillField(k))return;v[k]=mergeAutofillValue(v[k],ui.autofillParsed[k],applyMode,k)});persistNow();closeAutofill();renderVariants();toast('已应用联网补全')}

function renderAutofillDiff(v,data){const current=flattenAutofill(v);const incoming=flattenAutofill(data||{});const keys=Object.keys(incoming).sort();if(!keys.length)return empty('没有可预览字段');return `<div class="autofill-diff"><div class="autofill-diff-row"><div class="autofill-diff-label">字段名</div><div class="autofill-diff-label">当前值</div><div class="autofill-diff-label">LLM值</div><div class="autofill-diff-label">状态</div></div>${keys.map(k=>{const locked=isLockedAutofillField(k);const same=sameAutofillValue(current[k],incoming[k]);const status=locked?'id锁定':same?'一致':isEmptyAutofillValue(current[k])&&!isEmptyAutofillValue(incoming[k])?'新填':'改写';const cls=locked?'locked':status==='新填'?'new':'';return `<div class="autofill-diff-row ${cls}"><div class="autofill-diff-label">${esc(k)}</div><div class="autofill-diff-value">${esc(shortAutofillValue(current[k]))}</div><div class="autofill-diff-value">${esc(shortAutofillValue(incoming[k]))}</div><div><span class="badge ${status==='改写'?'mid':status==='新填'?'low':''}">${status}</span></div></div>`}).join('')}</div>`}
function flattenAutofill(obj,prefix='',out={}){if(!obj||typeof obj!=='object'||Array.isArray(obj)){if(prefix)out[prefix]=obj;return out}Object.keys(obj).forEach(k=>{const val=obj[k];const path=prefix?prefix+'.'+k:k;if(val&&typeof val==='object'&&!Array.isArray(val))flattenAutofill(val,path,out);else out[path]=val});return out}
function shortAutofillValue(value){if(value===undefined)return '';const text=typeof value==='string'?value:JSON.stringify(value);return String(text??'').length>140?String(text??'').slice(0,137)+'...':String(text??'')}
function sameAutofillValue(a,b){return JSON.stringify(a??null)===JSON.stringify(b??null)}
function isLockedAutofillField(path){return ['id','categoryId','name'].includes(String(path).split('.')[0])}
function isPlainAutofillObject(value){return !!value&&typeof value==='object'&&!Array.isArray(value)}
function isEmptyAutofillValue(value){return value===null||value===undefined||value===''||value===0||(Array.isArray(value)&&value.length===0)||(isPlainAutofillObject(value)&&Object.keys(value).length===0)}

render();toast('已恢复初始数据')}function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>el.classList.remove('show'),1800)}function groupBy(arr,fn){return arr.reduce((m,x)=>{const k=fn(x);(m[k]||(m[k]=[])).push(x);return m},{})}function originText(v){const o=v.origin||{};return[o.country,o.province,o.city,o.county].filter(Boolean).join(' / ')}function esc(v){return String(v??'').replace(/[&<>"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]))}function empty(text){return`<div class="empty">${esc(text)}</div>`}
